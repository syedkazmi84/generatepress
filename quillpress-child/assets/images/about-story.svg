<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" fill="none" role="img" aria-label="A publishing desk with stacked books, a manuscript and a cup of coffee">
  <defs>
    <linearGradient id="abr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7cf95"/><stop offset="1" stop-color="#b08a35"/></linearGradient>
    <linearGradient id="aink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1e2c4f"/><stop offset="1" stop-color="#16203a"/></linearGradient>
  </defs>
  <circle cx="280" cy="220" r="210" fill="#c8a24c" opacity="0.12"/>
  <!-- desk -->
  <rect x="40" y="360" width="480" height="18" rx="6" fill="#d9cdb2"/>
  <!-- stacked books -->
  <g>
    <rect x="70" y="322" width="200" height="38" rx="6" fill="url(#aink)"/>
    <rect x="70" y="322" width="14" height="38" fill="#c8a24c"/>
    <rect x="90" y="286" width="185" height="36" rx="6" fill="#7c2b3b"/>
    <rect x="90" y="286" width="14" height="36" fill="#e7cf95"/>
    <rect x="78" y="252" width="170" height="34" rx="6" fill="url(#abr)"/>
    <rect x="78" y="252" width="14" height="34" fill="#16203a"/>
  </g>
  <!-- open manuscript -->
  <g transform="rotate(-6 380 300)">
    <rect x="300" y="230" width="180" height="130" rx="8" fill="#fff" stroke="#e6ddc9" stroke-width="2"/>
    <g stroke="#cdc3a9" stroke-width="4" stroke-linecap="round">
      <line x1="320" y1="256" x2="460" y2="256"/><line x1="320" y1="276" x2="460" y2="276"/>
      <line x1="320" y1="296" x2="460" y2="296"/><line x1="320" y1="316" x2="420" y2="316"/>
    </g>
    <rect x="320" y="244" width="26" height="0" />
  </g>
  <!-- coffee cup -->
  <g>
    <rect x="410" y="176" width="70" height="56" rx="10" fill="#fff" stroke="#d9cdb2" stroke-width="2"/>
    <path d="M480 190 h14 a14 14 0 0 1 0 28 h-14" stroke="#d9cdb2" stroke-width="6" fill="none"/>
    <rect x="410" y="176" width="70" height="14" rx="7" fill="url(#abr)"/>
    <path d="M424 168 c0 -10 8 -10 8 -20 M444 168 c0 -10 8 -10 8 -20" stroke="#c8a24c" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  <!-- quill in inkpot -->
  <g>
    <ellipse cx="140" cy="230" rx="34" ry="16" fill="#16203a"/>
    <rect x="106" y="200" width="68" height="34" rx="8" fill="url(#aink)"/>
    <path d="M150 214 C176 150 210 120 240 104 C232 150 210 196 172 220 Z" fill="url(#abr)"/>
  </g>
  <!-- floating stars -->
  <g fill="#c8a24c">
    <path d="M470 120 l5 12 13 1 -9 9 2 13 -11 -7 -11 7 2 -13 -9 -9 13 -1z" opacity="0.85"/>
    <circle cx="70" cy="150" r="5" opacity="0.6"/>
    <circle cx="520" cy="300" r="4" opacity="0.6"/>
  </g>
</svg>
